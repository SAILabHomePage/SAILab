<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAILab | 문의</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">SAILab</a>
      <button class="menu-toggle" id="menuToggle" aria-label="메뉴 열기">☰</button>
      <nav class="site-nav" id="siteNav">
        <a href="index.html">홈</a>
        <a href="research.html">연구</a>
        <a href="publications.html">출판물</a>
        <a href="members.html">멤버</a>
        <a href="contact.html">문의</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-section">
      <h1>문의하기</h1>
      <p>SAILab에 대한 질문이나 협업 제안이 있으시면 아래 양식을 통해 연락주세요.</p>
      <form class="contact-form" id="contactForm">
        <label for="name">이름</label>
        <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>

        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="example@domain.com" required>

        <label for="message">메시지</label>
        <textarea id="message" name="message" rows="6" placeholder="메시지를 입력하세요" required></textarea>

        <button type="submit" class="btn">전송</button>
      </form>
      <p class="notice" id="formNotice"></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 SAILab. 모든 권리 보유.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
