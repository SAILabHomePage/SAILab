<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAILab | Gallery</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <span class="brand-name">SAILab</span>
        <span class="brand-tag">Scalable AI Lab</span>
      </a>
      <nav class="site-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="members.html" class="nav-link">Members</a>
        <a href="research.html" class="nav-link">Research</a>
        <a href="publications.html" class="nav-link">Publications</a>
        <a href="gallery.html" class="nav-link active">Gallery</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <div class="gallery-page-head">
          <h1>Gallery</h1>
        </div>

        <section class="gallery-year-section">
          <h2 class="gallery-year-title">2026</h2>

          <details class="gallery-album">
            <summary class="gallery-album-summary">
              <div class="gallery-album-info">
                <h3> 5월 스승의 날</h3>
                <p class="gallery-album-desc">Click to view all photos.</p>
              </div>
              
              <div class="gallery-album-cover">
                <img src="images/gallery/26_스승의날1.jpg" alt="Teachers' Day celebration cover">
              </div>
              
            </summary>

            <div class="gallery-album-body">
              <div class="gallery-album-grid">
                <a href="images/gallery/26_스승의날1.jpg" class="gallery-photo-card" target="_blank" rel="noopener">
                  <img src="images/gallery/26_스승의날1.jpg" alt="Teachers' Day celebration photo 1">
                </a>

                <a href="images/gallery/26_스승의날2.jpg" class="gallery-photo-card" target="_blank" rel="noopener">
                  <img src="images/gallery/26_스승의날2.jpg" alt="Teachers' Day celebration photo 2">
                </a>
              </div>
            </div>
          </details>
        </section>
      </div>
    </section>
  </main>
