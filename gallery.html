<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAILab | Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css">
  <link rel="icon" type="image/png" href="images/sailab_logo/sailab_logo.png">
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <img class="brand-logo" src="images/sailab_logo/sailab_logo.png" alt="SAILab logo">
        <span class="brand-text">
          <span class="brand-name">SAILab</span>
          <span class="brand-tag">Scalable AI Lab</span>
        </span>
      </a>
      <nav class="site-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="members.html" class="nav-link">Members</a>
        <a href="research.html" class="nav-link">Research</a>
        <a href="publications.html" class="nav-link">Publications</a>
        <a href="gallery.html" class="nav-link active">Gallery</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <div class="gallery-page-head">
          <h1>Gallery</h1>
        </div>

        <section class="gallery-year-section">
          <h2 class="gallery-year-title">2026</h2>

          <details class="gallery-album">
            <summary class="gallery-album-summary">
              <div class="gallery-album-header">
                <div class="gallery-album-info">
                  <p class="gallery-album-date">2026 </p>
                  <h3>5월 스승의 날</h3>
                </div>
                <span class="gallery-album-toggle" aria-hidden="true"></span>
              </div>
              <div class="gallery-album-cover">
                <img src="images/gallery/26_스승의날/26_스승의날1.jpg" alt="5월 스승의 날 대표 사진">
              </div>
            </summary>

            <div class="gallery-album-body">
              <div class="gallery-album-grid">
                <a href="images/gallery/26_스승의날/26_스승의날1.jpg" class="gallery-photo-card" target="_blank" rel="noopener">
                  <img src="images/gallery/26_스승의날/26_스승의날1.jpg" alt="5월 스승의 날 사진 1">
                </a>
                <a href="images/gallery/26_스승의날/26_스승의날2.jpg" class="gallery-photo-card" target="_blank" rel="noopener">
                  <img src="images/gallery/26_스승의날/26_스승의날2.jpg" alt="5월 스승의 날 사진 2">
                </a>
              </div>
            </div>
          </details>

        </section>
      </div>
    </section>
  </main>
